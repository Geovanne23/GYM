<!doctype html>

  <meta name="theme-color" content="#060609" />
  <title>Além da Genética</title>
  <meta name="description" content="Plano de treino semanal com técnicas avançadas de hipertrofia." />
  <link rel="icon" type="image/x-icon" href="img/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />

<body>

  <div class="bg">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="app">

    <!-- PROFILE TABS -->
    <div class="profile-tabs">
      <button id="p1Btn" class="p-tab active" onclick="switchProfile(1)">
        <i class="ph-fill ph-barbell"></i> Perfil 1: Hipertrofia
      </button>
      <button id="p2Btn" class="p-tab" onclick="switchProfile(2)">
        <i class="ph-fill ph-fire"></i> Perfil 2: Emagrecimento
      </button>
    </div>

    <!-- HEADER -->
    <header class="header">
      <div class="eyebrow">
        <span class="eyebrow-dot"></span>
        <span class="eyebrow-text" id="hEyebrow">Metodologia Avançada</span>
      </div>

      <h1 class="h-title" id="hTitle">
        <span class="t-red">Além da</span><br>Genética
      </h1>

      <p class="h-desc" id="hDesc">Plano semanal de hipertrofia com rest-pause, drop set e pico de contração.</p>

      <div class="pg-row">
        <div class="pg-track">
          <div class="pg-fill" id="pFill"></div>
        </div>
        <span class="pg-pct" id="pText">0%</span>
      </div>

      <div class="stats">
        <div class="stat"><span class="stat-n cr">5</span><span class="stat-l">Treinos</span></div>
        <div class="stat"><span class="stat-n cg">38</span><span class="stat-l">Exercícios</span></div>
        <div class="stat"><span class="stat-n ce" id="sDone">0</span><span class="stat-l">Feitos</span></div>
      </div>
    </header>

    <!-- PERSISTENT DIET CARD (PROFILE 1) -->
    <div id="dietCard" class="diet-wrap" style="display:none"></div>

    <nav id="tabs" class="tabs"></nav>
    <main id="content"></main>

    <footer class="footer">
      <div class="footer-save">
        <i class="ph-fill ph-check-circle"></i>
        Progresso salvo automaticamente
      </div>
      <div class="footer-bottom">
        <p>Desenvolvido por Geovanne</p>
        <p>© 2026 Além da Genética • Todos os direitos reservados</p>
      </div>
    </footer>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal-bg">
    <div class="modal-card">
      <div class="modal-icon"><i class="ph-fill ph-warning"></i></div>
      <h2 class="modal-title">Confirmar</h2>
      <p id="mMsg" class="modal-msg"></p>
      <div class="modal-btns">
        <button id="mNo" class="modal-btn btn-cancel">Cancelar</button>
        <button id="mYes" class="modal-btn btn-confirm">Confirmar</button>
      </div>
    </div>

          { id: 'd4', n: 'Cadeira abdutora (máquina)', t: '1-2s pico aberto', s: [{ l: 'Trabalho', d: '3 × 15' }] },
          { id: 'd5', n: 'Glúteo no cabo', t: 'Lento e controlado', s: [{ l: 'Trabalho', d: '3 × 12 (cada)' }] },
          { id: 'd6', n: 'Panturrilha sentado', t: '2s pico no topo', s: [{ l: 'Trabalho', d: '4 × 15' }] },
          { id: 'd7', n: 'Cardio: Escada ou bike', t: 'Ritmo constante', s: [{ l: 'Fim de Treino', d: '1 × 15–20 min' }] }
        ]
      },
      {
        id: 'treino-e', title: 'Treino E', sub: 'Ombro + Abdômen',
        alert: 'Mounjaro: Priorize a hidratação e respeite limites.',
        ex: [
          { id: 'e1', n: 'Desenvolvimento c/ halter', t: 'Subida controlada', s: [{ l: 'Trabalho', d: '4 × 8–10' }] },
          { id: 'e2', n: 'Elevação lateral (halter)', t: 'Subir até ombro + 1 drop set na última', s: [{ l: 'Trabalho', d: '3 × 12' }] },
          { id: 'e3', n: 'Elevação frontal (halter ou anilha)', t: 'Movimento controlado', s: [{ l: 'Trabalho', d: '3 × 12' }] },
          { id: 'e4', n: 'Encolhimento (halter)', t: '1s pico no topo', s: [{ l: 'Trabalho', d: '3 × 12–15' }] },
          { id: 'e5', n: 'Face pull (corda pulley)', t: 'Foco em postura', s: [{ l: 'Trabalho', d: '3 × 12' }] },
          { id: 'e6', n: 'Prancha', t: 'Abdômen', s: [{ l: 'Trabalho', d: '3 × 40-60s' }] },
          { id: 'e7', n: 'Crunch', t: 'Abdômen', s: [{ l: 'Trabalho', d: '3 × 15' }] },
          { id: 'e8', n: 'Elevação de pernas', t: 'Abdômen', s: [{ l: 'Trabalho', d: '3 × 12' }] },
          { id: 'e9', n: 'Abdominal infra banco', t: 'Abdômen', s: [{ l: 'Trabalho', d: '2 × 15' }] },
          { id: 'e10', n: 'Cardio Leve', t: 'Recuperação', s: [{ l: 'Fim de Treino', d: '1 × 20–25 min' }] }
        ]
      }
    ];

    function getD() { return currentProfile === 1 ? D1 : D2; }

    /* ============================================ STATE ============================================ */
    const $t = document.getElementById('tabs'), $m = document.getElementById('content'), $md = document.getElementById('modal');
    let act = 'semana', st = ld(), mCb = null;

    document.getElementById('mNo').onclick = () => { $md.classList.remove('open'); mCb = null };
    document.getElementById('mYes').onclick = () => { $md.classList.remove('open'); if (mCb) { mCb(); mCb = null } };
    $md.onclick = e => { if (e.target === $md) { $md.classList.remove('open'); mCb = null } };
    function ask(msg, cb) { document.getElementById('mMsg').textContent = msg; mCb = cb; $md.classList.add('open') }

    function ld() { try { return JSON.parse(localStorage.getItem(getSK())) || {} } catch { return {} } }
    function sv() { try { localStorage.setItem(getSK(), JSON.stringify(st)) } catch { } }
    function k(a, b, c) { return a + '|' + b + '|' + c }
    function gc(a, b, c) { return !!st[k(a, b, c)] }
    function sc(a, b, c, v) { st[k(a, b, c)] = v }
    function ed(tid, eid, len) { for (let i = 0; i < len; i++)if (!gc(tid, eid, i)) return false; return len > 0 }
    function wd(tid) { return !!st[tid + '_d'] }
    function swd(tid, v) { st[tid + '_d'] = v }

    function tags(t) {
      if (!t) return [];
      const r = [], lo = t.toLowerCase();
      if (lo.includes('rest')) { const m = t.match(/(\d+)\s*rest/i); r.push({ txt: (m ? m[1] + ' ' : '') + 'Rest-Pause', cls: 'tag-rest' }) }
      if (lo.includes('drop')) { const m = t.match(/(\d+)\s*drop/i); r.push({ txt: (m ? m[1] + ' ' : '') + 'Drop Set', cls: 'tag-drop' }) }
      if (lo.includes('pico')) { const m = t.match(/(\d+)s/i); r.push({ txt: (m ? m[1] + 's ' : '') + 'Pico', cls: 'tag-pico' }) }
      if (r.length === 0) r.push({ txt: t, cls: 'tag-pico' }); // Fallback tag rendering
      return r;
    }

    function prog() {
      let t = 0, d = 0, exd = 0;
      getD().forEach(tab => {
        if (!tab.ex) return; tab.ex.forEach(e => {
          e.s.forEach((_, i) => { t++; if (gc(tab.id, e.id, i)) d++ });
          if (ed(tab.id, e.id, e.s.length)) exd++;
        })
      });
      return { pct: t > 0 ? Math.round(d / t * 100) : 0, exd };
    }
    function uprog() {
      const { pct, exd } = prog();
      const f = document.getElementById('pFill'), t = document.getElementById('pText'), s = document.getElementById('sDone');
      if (f) f.style.width = pct + '%'; if (t) t.textContent = pct + '%'; if (s) s.textContent = exd;
    }
    function wid(plan) {
      const p = plan.toLowerCase();
      if (p.includes('treino a')) return 'treino-a'; if (p.includes('treino b')) return 'treino-b';
      if (p.includes('treino c')) return 'treino-c'; if (p.includes('treino d')) return 'treino-d';
      if (p.includes('treino e')) return 'treino-e'; return null;
    }

    /* ============================================ RENDER ============================================ */
    function renderTabs() {
      $t.innerHTML = '';
      getD().forEach(tab => {
        const b = document.createElement('button');
        b.className = 'tab' + (tab.id === act ? ' active' : '');
        b.textContent = tab.title;
        b.onclick = () => { act = tab.id; renderTabs(); render() };
        $t.appendChild(b);
      });
      const tr = document.createElement('button');
      tr.className = 'tab tab-trash';
      tr.innerHTML = '<i class="ph ph-trash"></i>';
      tr.title = 'Zerar tudo';
      tr.onclick = () => ask('Zerar TODO o progresso? Não pode ser desfeito.', () => { st = {}; sv(); render(); uprog() });
      $t.appendChild(tr);
    }

    function render() {
      const tab = getD().find(t => t.id === act);
      $m.innerHTML = '';
      if (!tab) return;
      if (tab.type === 'week') rWeek(tab);
      else rWork(tab);
      uprog();
    }

    /* ============================================ WEEK ============================================ */
    function rWeek(tab) {
      const p = document.createElement('div'); p.className = 'panel';

      const hd = document.createElement('div'); hd.className = 'week-head';
      hd.innerHTML = '<h2 class="week-title">Plano da Semana</h2>';
      p.appendChild(hd);

      const g = document.createElement('div'); g.className = 'week-grid';

      tab.days.forEach((d, idx) => {
        const rest = d.plan.toLowerCase().includes('descanso');
        const wi = wid(d.plan);
        let isDone = false;
        if (wi) { const w = getD().find(t => t.id === wi); if (w && w.ex) isDone = w.ex.every(e => ed(wi, e.id, e.s.length)) }

        const card = document.createElement('div');
        card.className = 'day-card reveal ' + `stagger-${(idx % 7) + 1}` + (rest ? ' rest' : '') + (isDone ? ' done' : '');
        if (!rest && wi) {
          card.style.cursor = 'pointer';
          card.onclick = () => {
            act = wi;
            renderTabs();
            render();
          };
        }

        const badge = wi && !rest ? `<span class="day-badge">${d.plan.split(' ')[1]}</span>` : '';
        const iconCls = dayIcons[d.plan] || 'ph-fill ph-dumbbell';
        const iconContent = isDone ? '✓' : `<i class="${iconCls}"></i>`;

        card.innerHTML = `
      <div class="day-top">
        <span class="day-label">${d.d}</span>
        ${badge}
      </div>
      <div class="day-plan">${d.plan}</div>
      <div class="day-sub">${d.sub}</div>
      <div class="day-icon">${iconContent}</div>
    `;
        g.appendChild(card);
      });
      p.appendChild(g);

      /* Legend */
      if (currentProfile === 1) {
        const lg = document.createElement('div'); lg.className = 'legend';
        lg.innerHTML = `
      <p class="legend-t">Técnicas Aplicadas</p>
      <div class="legend-list">
        <div class="legend-item"><span class="legend-dot lr"></span><strong>Rest-Pause</strong>10s de pausa na falha muscular</div>
        <div class="legend-item"><span class="legend-dot lp"></span><strong>Drop Set</strong>Redução de carga sem descanso</div>
        <div class="legend-item"><span class="legend-dot lc"></span><strong>Pico</strong>2s de squeeze na máxima tensão</div>
      </div>
    `;
        p.appendChild(lg);
      } else if (currentProfile === 2) {
        const lg = document.createElement('div'); lg.className = 'legend';
        lg.innerHTML = `
      <p class="legend-t" style="color: var(--orange)">Padrão de Execução</p>
      <div class="legend-list" style="margin-bottom: 18px;">
        <div class="legend-item"><span class="legend-dot" style="background:var(--orange); box-shadow:0 0 6px rgba(255,107,53,0.5)"></span><strong>Descanso</strong>30–60s (até 90s em ex. pesados)</div>
        <div class="legend-item"><span class="legend-dot" style="background:var(--orange); box-shadow:0 0 6px rgba(255,107,53,0.5)"></span><strong>Controle e Progressão</strong>Execução controlada (principalmente na descida). Última série próxima da falha. Progressão de carga semanal.</div>
      </div>

      <p class="legend-t" style="color: var(--red)">Observações Mounjaro</p>
      <div class="legend-list">
        <div class="legend-item"><span class="legend-dot lr"></span><strong>Alimentação</strong>Evitar treino pesado em jejum. Consumir proteína leve antes do treino.</div>
        <div class="legend-item"><span class="legend-dot lr"></span><strong>Atenção</strong>Ajustar intensidade se houver fraqueza e priorizar hidratação.</div>
      </div>
    `;
        p.appendChild(lg);
      }
      $m.appendChild(p);
    }

    /* ============================================ WORKOUT ============================================ */
    function rWork(tab) {
      const p = document.createElement('div'); p.className = 'panel';

      const hd = document.createElement('div'); hd.className = 'wo-head';
      const ttl = document.createElement('h2'); ttl.className = 'wo-title';
      ttl.innerHTML = tab.title + ` <span style="color:var(--text-3);font-weight:500;font-size:.85rem">· ${tab.sub}</span>`;
      hd.appendChild(ttl);

      if (tab.alert) {
        const al = document.createElement('div'); al.className = 'alert';
        al.innerHTML = `<i class="ph-fill ph-lightning"></i><span>${tab.alert}</span>`;
        hd.appendChild(al);
      }

      const isDone = wd(tab.id);
      const cBtn = document.createElement('button'); cBtn.className = 'btn-complete' + (isDone ? ' done' : '');
      cBtn.innerHTML = isDone ? '<i class="ph-fill ph-check-circle"></i> Treino concluído!' : '<i class="ph ph-check-circle"></i> Marcar como concluído';
      cBtn.onclick = () => {
        const v = !wd(tab.id);
        tab.ex.forEach(e => e.s.forEach((_, i) => sc(tab.id, e.id, i, v)));
        swd(tab.id, v); sv(); render();
      };
      hd.appendChild(cBtn);
      p.appendChild(hd);

      const list = document.createElement('div'); list.className = 'ex-list';
      tab.ex.forEach((e, idx) => {
        const card = buildCard(tab, e, idx + 1, cBtn);
        card.classList.add('reveal');
        card.classList.add(`stagger-${(idx % 5) + 1}`);
        list.appendChild(card);
      });
      p.appendChild(list);

      const rw = document.createElement('div'); rw.className = 'reset-wrap';
      const rb = document.createElement('button'); rb.className = 'btn-reset';
      rb.innerHTML = '<i class="ph ph-arrow-counter-clockwise"></i> Zerar treino';
      rb.onclick = () => ask('Zerar o progresso deste treino?', () => {
        tab.ex.forEach(e => e.s.forEach((_, i) => sc(tab.id, e.id, i, false)));
        swd(tab.id, false); sv(); render();
      });
      rw.appendChild(rb); p.appendChild(rw);
      $m.appendChild(p);
    }

    /* ============================================ DIET PERSISTENT ============================================ */
    let dietOpen = false;
    function renderDietCard() {
      const el = document.getElementById('dietCard');
      if (currentProfile !== 1) { el.style.display = 'none'; return; }
      el.style.display = 'block';

      el.innerHTML = `
        <div class="diet-card-main">
          <div class="diet-header" onclick="toggleDiet()">
            <div class="diet-titles">
              <span class="diet-eyebrow">Plano Alimentar</span>
              <h3 class="diet-title">Recomendação de Dieta</h3>
            </div>
            <i class="ph ph-caret-${dietOpen ? 'up' : 'down'} diet-arrow"></i>
          </div>
          <div class="diet-collapsible ${dietOpen ? 'open' : ''}">
            <div class="diet-content">
              <div class="meal-list">
                ${dietData.meals.map(m => `
                  <div class="meal-item">
                    <div class="meal-info">
                      <span class="meal-time">${m.t}</span>
                      <span class="meal-desc">${m.i}</span>
                    </div>
                    <span class="meal-prot">${m.p}</span>
                  </div>
                `).join('')}
              </div>
              <div class="diet-tips">
                <p class="tips-title">💡 Dicas do Geovanne</p>
                <ul>
                  ${dietData.tips.map(t => `<li>${t}</li>`).join('')}
                </ul>
              </div>
            </div>
          </div>
        </div>
      `;
    }

    window.toggleDiet = () => { dietOpen = !dietOpen; renderDietCard(); };

    /* ============================================ CARD ============================================ */
    function buildCard(tab, e, num, cBtn) {
      let doneCount = 0;
      e.s.forEach((_, i) => { if (gc(tab.id, e.id, i)) doneCount++; });
      const done = doneCount === e.s.length && e.s.length > 0;
      const partial = doneCount > 0 && !done;

      const card = document.createElement('div');
      card.className = 'ex-card' + (done ? ' done' : (partial ? ' partial' : ''));

      const tgs = tags(e.t);
      const tgsH = tgs.length ? `<div class="tags">${tgs.map(t => `<span class="tag ${t.cls}">${t.txt}</span>`).join('')}</div>` : '';

      const db = document.createElement('button'); db.className = 'btn-done' + (done ? ' on' : '');
      db.textContent = done ? '✓ Feito' : 'Concluir';
      db.onclick = () => {
        const now = !ed(tab.id, e.id, e.s.length);
        e.s.forEach((_, i) => sc(tab.id, e.id, i, now)); sv();
        card.querySelectorAll('.cb').forEach(c => { c.checked = now });
        card.classList.remove('done', 'partial');
        if (now) card.classList.add('done');
        db.className = 'btn-done' + (now ? ' on' : '');
        db.textContent = now ? '✓ Feito' : 'Concluir';
        syncWk(tab, cBtn); uprog();
      };

      const top = document.createElement('div'); top.className = 'ex-top';
      const info = document.createElement('div'); info.className = 'ex-info';
      info.innerHTML = `<div class="ex-name">${e.n}</div>${tgsH}`;
      top.appendChild(info); top.appendChild(db); card.appendChild(top);

      const sw = document.createElement('div'); sw.className = 'sets';
      e.s.forEach((s, i) => {
        const row = document.createElement('div'); row.className = 'set-row';
        row.onclick = (event) => {
          // If the click wasn't directly on the checkbox, toggle it
          const cb = row.querySelector('.cb');
          if (event.target !== cb) {
            cb.checked = !cb.checked;
            cb.dispatchEvent(new Event('change'));
          }
        };

        const cb = document.createElement('input'); cb.type = 'checkbox'; cb.className = 'cb';
        cb.checked = gc(tab.id, e.id, i); cb.setAttribute('aria-label', s.l);
        cb.onchange = () => {
          sc(tab.id, e.id, i, cb.checked); sv();
          const cbs = Array.from(card.querySelectorAll('.cb'));
          const count = cbs.filter(c => c.checked).length;
          const all = count === cbs.length;
          const isPartial = count > 0 && !all;

          card.classList.toggle('done', all);
          card.classList.toggle('partial', isPartial);

          db.className = 'btn-done' + (all ? ' on' : '');
          db.textContent = all ? '✓ Feito' : 'Concluir';
          syncWk(tab, cBtn); uprog();
        };
        const lbl = document.createElement('span'); lbl.className = 'set-lbl'; lbl.textContent = s.l;
        const det = document.createElement('span'); det.className = 'set-detail'; det.textContent = s.d;
        row.appendChild(cb); row.appendChild(lbl); row.appendChild(det); sw.appendChild(row);
      });
      card.appendChild(sw); return card;
    }

    function syncWk(tab, btn) {
      if (!btn) return;
      const all = tab.ex.every(e => ed(tab.id, e.id, e.s.length));
      const was = wd(tab.id);
      if (all && !was) { swd(tab.id, true); btn.classList.add('done'); btn.innerHTML = '<i class="ph-fill ph-check-circle"></i> Treino concluído!'; sv() }
      if (!all && was) { swd(tab.id, false); btn.classList.remove('done'); btn.innerHTML = '<i class="ph ph-check-circle"></i> Marcar como concluído'; sv() }
    }

    renderTabs(); render(); renderDietCard(); uprog();
  </script>
</body>

</html>
